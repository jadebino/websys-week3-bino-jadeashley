<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Portfolio Home</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
       
            background-color: #0d1b2a; 
            color: white;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            text-align: center;
            width: 100%;
            max-width: 800px;
        }

   
        .main-header {
            background-color: #3d60c1; 
            padding: 30px;
            border-radius: 15px;
            margin-bottom: 25px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }

        .main-header h1 {
            font-size: 2rem;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .profile-card {
            background-color: #4e73a5; 
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 15px 30px rgba(0,0,0,0.4);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

       
        .profile-img {
            width: 180px;
            height: 180px;
            border-radius: 20px;
            object-fit: cover;
            margin-bottom: 25px;
            border: 4px solid #1e3a8a;
          
            display: block;
            margin-left: auto;
            margin-right: auto;
        }

        .profile-card h2 {
            font-size: 1.8rem;
            margin-bottom: 10px;
            color: #ffffff;
        }

        .profile-card p {
            font-size: 1.2rem;
            color: #d1d5db;
            font-weight: 300;
        }

    
        .btn-container {
            margin-top: 30px;
        }

        .page-btn {
            display: inline-block;
            background-color: #1e3a8a;
            color: white;
            padding: 12px 40px;
            text-decoration: none;
            border-radius: 10px;
            font-weight: bold;
            transition: 0.3s;
            border: 1px solid #3b82f6;
        }

        .page-btn:hover {
            background-color: #2563eb;
            transform: scale(1.05);
        }
    </style>
</head>
<body>

    <div class="container">
        <header class="main-header">
            <h1>my personal website</h1>
        </header>

        <main class="profile-card">
            <img src="jade.jpg" alt="Profile Picture" class="profile-img">
            
            <h2>JADE ASHLEY BINO</h2>
            <p>Bachelor of Science in Information Technology with Specialization in Mobile and Web Development</p>
        </main>

        <div class="btn-container">
            <a href="page2.html" class="page-btn">Next</a>
        </div>
    </div>

</body>
</html>
